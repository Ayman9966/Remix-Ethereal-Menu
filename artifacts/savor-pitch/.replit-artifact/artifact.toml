kind = "slides"
previewPath = "/savor-pitch/"
title = "Savor — Pitch Deck"
version = "1.0.0"
id = "artifacts/savor-pitch"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/savor-pitch/" ]
localPort = 24276

[services.development]
run = "pnpm --filter @workspace/savor-pitch run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/savor-pitch", "run", "build" ]
publicDir = "artifacts/savor-pitch/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24276"
BASE_PATH = "/savor-pitch/"
