kind = "video"
previewPath = "/savor-promo/"
title = "Savor Promo Video"
version = "1.0.0"
id = "artifacts/savor-promo"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/savor-promo/" ]
localPort = 22551

[services.development]
run = "pnpm --filter @workspace/savor-promo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/savor-promo", "run", "build" ]
publicDir = "artifacts/savor-promo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22551"
BASE_PATH = "/savor-promo/"
